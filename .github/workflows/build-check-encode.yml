name: JSON Build, API Check & Encoding

on:
  schedule:
    - cron: "0 17 * * *"  # 每天北京时间凌晨1点运行 (UTC 17点)
  push:
    branches: [ main ]
    paths:
      - 'LunaTV-config.json'
      - 'build-configs.js'
      - 'encode.js'
      - 'check_api.js'
      - 'update_readme.js'
      - 'verify.js'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:
    inputs:
      api_name:
        description: '搜索关键字'
        default: 你好
      check_quarantined:
        description: '同时复查隔离来源'
        type: boolean
        default: false

concurrency:
  group: lunatv-config-build
  cancel-in-progress: false

jobs:
  build-check-encode:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write  # 允许推送

    steps:
      # 1️⃣ 检出仓库
      - uses: actions/checkout@v4

      # 2️⃣ 使用锁定版本安装 Node.js 依赖
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # 3️⃣ 生成精简配置与 Base58
      - name: Build subscriptions
        run: npm run build

      # 4️⃣ 验证 JSON、衍生档与脚本
      - name: Verify generated files
        run: npm test

      # 5️⃣ 运行 API 检查脚本
      - name: Run API check
        run: |
          API_NAME="${{ github.event.inputs.api_name || '你好' }}"
          CHECK_QUARANTINED="${{ github.event.inputs.check_quarantined || 'false' }}"
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$(date -u +%u)" = "7" ]; then
            CHECK_QUARANTINED=true
          fi
          echo "检查 API: $API_NAME（复查隔离来源: $CHECK_QUARANTINED）"
          CHECK_QUARANTINED="$CHECK_QUARANTINED" npm run check:api -- "$API_NAME"

      # 6️⃣ 更新 README 或报告
      - name: Update report
        run: npm run update:readme

      # 7️⃣ 提交并推送所有生成文件
      - name: Commit and push all generated files
        run: |
          # 配置 Git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 若检测期间远端已有新提交则安全退出，避免提交过期报告
          git fetch origin main
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]; then
            echo "远端 main 已更新，请重新运行工作流程"
            exit 1
          fi

          # 添加所有生成文件
          git add jingjian.json jin18.json LunaTV-config.txt jingjian.txt jin18.txt report.md README.md

          # 提交更新，如果没有变化则输出提示
          git commit -m "自动更新 JSON、Base58 和 API 报告 ($(date -d '+8 hour' +'%Y-%m-%d %H:%M:%S CST'))" || echo "⚠️ 没有文件变化可提交"

          # 推送到远程 main
          git push origin HEAD:main


