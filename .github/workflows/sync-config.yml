name: Sync config from upstream

on:
  schedule:
    - cron: "0 17 * * *"  # 每天原作者更新後自動拉
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch upstream config files
        run: |
          UPSTREAM="https://raw.githubusercontent.com/hafrey1/LunaTV-config/main"
          curl -fsSL "$UPSTREAM/jin18.json" -o jin18.json
          curl -fsSL "$UPSTREAM/jingjian.json" -o jingjian.json
          curl -fsSL "$UPSTREAM/LunaTV-config.json" -o LunaTV-config.json
          # 同步 base58 編碼版本
          curl -fsSL "$UPSTREAM/jin18.txt" -o jin18.txt
          curl -fsSL "$UPSTREAM/jingjian.txt" -o jingjian.txt
          curl -fsSL "$UPSTREAM/LunaTV-config.txt" -o LunaTV-config.txt

      - name: Replace proxy URLs for our domain
        run: |
          sed -i 's|pz.v88.qzz.io|pz.berserk.qzz.io|g' jin18.json jingjian.json LunaTV-config.json config.js
          # 如果 txt 是 base58 編碼的，也需要重新生成（下方步驟處理）

      - name: Regenerate base58 files from JSON
        run: |
          node -e "
          const fs = require('fs');
          const BASE58 = '123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';
          function base58Encode(obj) {
            const str = JSON.stringify(obj);
            const bytes = new TextEncoder().encode(str);
            let intVal = 0n;
            for (let b of bytes) intVal = (intVal << 8n) + BigInt(b);
            let result = '';
            while (intVal > 0n) { const m = intVal % 58n; result = BASE58[Number(m)] + result; intVal = intVal / 58n; }
            for (let b of bytes) { if (b === 0) result = BASE58[0] + result; else break; }
            return result;
          }
          for (const f of ['jin18','jingjian','LunaTV-config']) {
            const data = JSON.parse(fs.readFileSync(f + '.json','utf8'));
            fs.writeFileSync(f + '.txt', base58Encode(data));
          }
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jin18.json jingjian.json LunaTV-config.json jin18.txt jingjian.txt LunaTV-config.txt config.js
          if git diff --cached --quiet; then
            echo "No changes to sync"
          else
            git commit -m "自動同步上游片源配置 $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            git push
          fi